name: build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*.*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5.0.0
        with:
          distribution: 'adopt'
          java-version: '17'
          cache: 'gradle'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Native Binaries
        run: |
          docker compose -f docker-compose-build.yml up --build --abort-on-container-exit
      - name: Keystore
        run: |
          [ "${{ secrets.RELEASE_STORE_BASE64}}" == "" ] || echo "${{ secrets.RELEASE_STORE_BASE64}}" | base64 -d > keystore.jks
      - name: Build with Gradle
        env:
          CI_VERSION: ${{ github.ref }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          export GIT_COMMIT_COUNT="$(git rev-list --all --count)"
          export RELEASE_STORE_FILE="$(readlink -f keystore.jks 2>/dev/null || echo '')"
          echo "GIT_COMMIT_COUNT: $GIT_COMMIT_COUNT"
          if [ -e keystore.jks ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
          mv app/build/outputs/apk/*/*.apk .
      - uses: actions/upload-artifact@v4
        with:
          path: '*.apk'
